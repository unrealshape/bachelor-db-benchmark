# Chart: weaviate/weaviate 17.x

image:
  registry: cr.weaviate.io
  repo: semitechnologies/weaviate
  tag: "1.37.6"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    cpu: "1"
    memory: "8Gi"
  limits:
    cpu: "2"
    memory: "8Gi"   # Thesis-Paritaet 2 vCPU / 8 GB (Pinecone s1.x1-Pendant)

storage:
  size: 50Gi
  storageClassName: local-path

authentication:
  anonymous_access:
    enabled: true

service:
  type: ClusterIP

# gRPC-Service eigener Key (Chart-Default ist LoadBalancer -> erzeugt sonst
# k3d-svclb-Shim-Pods). In-Cluster-Messung verbindet via ClusterIP-DNS, daher
# kein LoadBalancer noetig -> spart die Shim-Pods.
grpcService:
  enabled: true
  type: ClusterIP

# Server-seitige Latenz-Metriken: Prometheus-Endpoint auf :2112 (/metrics).
# Liefert u.a. Query-Latenz-Histogramme -> p50/p95/p99 server-seitig.
env:
  PROMETHEUS_MONITORING_ENABLED: "true"
  PROMETHEUS_MONITORING_PORT: 2112
  # Go-GC am 8-GiB-Pod-Limit halten (cgroup-OOM zuvorkommen). Etwas Headroom
  # unter 8Gi fuer Off-Heap (mmap'd HNSW-Segmente, Insert-Puffer).
  GOMEMLIMIT: "7000MiB"
  # Insert vom HNSW-Build entkoppeln: ab Stufe S passt der Index nicht in den
  # vectorCacheMaxObjects-Cache (8-GiB-Paritaet) -> synchroner Per-Insert-Build
  # thrasht auf Disk (~67 obj/s). Async-Queue baut gebatcht im Hintergrund.
  # Der Adapter wartet in build_index bis vector_queue_length=0 (sonst misst der
  # Recall einen halb gebauten Index).
  ASYNC_INDEXING: "true"

modules:
  text2vec-contextionary:
    enabled: false
  text2vec-transformers:
    enabled: false
