# läuft beim ersten Bootstrap als Superuser
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgvector-init
  namespace: db-pgvector
data:
  00_extension.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
  # 8-GB-Pod-Limit ist das QUERY/Serving-Budget (Thesis-Paritaet 2 vCPU / 8 GB,
  # Pinecone s1.x1). Der Index (~10-20 GB on-disk) > (shared_buffers + OS-Cache @8 GiB)
  # -> Spill = "Index waechst aus RAM" wird an der Query-Seite gemessen. pgvector nutzt
  # IVFFlat ab S (baut im Budget, kein Build/Query-Resize noetig); HNSW nur S0/S1.
  # maintenance_work_mem 2 GB: nur Build-Zeit (IVFFlat-k-means), beeinflusst Query-RAM nicht.
  01_tuning.sql: |
    ALTER SYSTEM SET shared_buffers = '2GB';
    ALTER SYSTEM SET maintenance_work_mem = '2GB';
    ALTER SYSTEM SET autovacuum_work_mem = '256MB';
    ALTER SYSTEM SET max_parallel_maintenance_workers = '2';
    ALTER SYSTEM SET max_parallel_workers_per_gather = '2';
    ALTER SYSTEM SET effective_cache_size = '4GB';
    ALTER SYSTEM SET random_page_cost = '1.1';
