apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: db-pgvector
  labels:
    app: pgvector
spec:
  serviceName: pgvector-headless
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: pgvector/pgvector:0.8.0-pg17
          imagePullPolicy: IfNotPresent
          # Server-seitige Latenz-Metrik: pg_stat_statements vorladen.
          args:
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
            - "-c"
            - "pg_stat_statements.track=all"
            - "-c"
            - "pg_stat_statements.max=10000"
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: pgvector-creds
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "1"
              memory: "8Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bench", "-d", "benchmark"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          # Liveness bewusst grosszuegig: unter schwerem COPY (5,25M+ Reviews bei
          # Stufe M/L) kann pg_isready transient timeouten -> Default (3x10s=30s)
          # killt den Pod mitten im Insert ("server closed connection"). 6x20s=120s
          # Grace deckt die Insert-Last ab. Probe-Timing ist keine Mess-Metrik.
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bench", "-d", "benchmark"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: init
          configMap:
            name: pgvector-init
        # /dev/shm im k8s-Default ist 64 MiB. Parallele Maintenance/Worker legen
        # Shared-Memory-Segmente in /dev/shm ab. Unter dem 8-GiB-Pod-Limit (Paritaet)
        # mit IVFFlat-Build (maintenance_work_mem 1 GB) reichen 2 GiB; emptyDir
        # medium:Memory zaehlt selbst gegen das Pod-RAM -> klein halten.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
