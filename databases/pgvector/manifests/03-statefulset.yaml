apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: db-pgvector
  labels:
    app: pgvector
spec:
  serviceName: pgvector-headless
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: pgvector/pgvector:0.8.0-pg17
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: pgvector-creds
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bench", "-d", "benchmark"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bench", "-d", "benchmark"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: init
          configMap:
            name: pgvector-init
        # /dev/shm im k8s-Default ist 64 MiB -- HNSW-Build auf 100k+ Vektoren
        # benötigt mehr. Memory-tmpfs auf 4 GiB hochziehen.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
