apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: db-pgvector
  labels:
    app: pgvector
spec:
  serviceName: pgvector-headless
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: pgvector/pgvector:0.8.0-pg17
          imagePullPolicy: IfNotPresent
          # Server-seitige Latenz-Metrik: pg_stat_statements vorladen.
          args:
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
            - "-c"
            - "pg_stat_statements.track=all"
            - "-c"
            - "pg_stat_statements.max=10000"
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: pgvector-creds
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "1"
              memory: "8Gi"
            limits:
              cpu: "2"
              memory: "20Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bench", "-d", "benchmark"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bench", "-d", "benchmark"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: init
          configMap:
            name: pgvector-init
        # /dev/shm im k8s-Default ist 64 MiB. Der PARALLELE HNSW-Build legt
        # maintenance_work_mem (~8 GB) als Shared-Memory-Segment in /dev/shm ab
        # -> 4 GiB reichen nicht (DiskFull). 10 GiB deckt maint_work_mem + Puffer;
        # passt mit shared_buffers (4 GB) in das 20-GiB-Pod-Limit.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
